name: Deploy Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required staging secrets
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_PATH: ${{ secrets.STAGING_PATH }}
        run: |
          test -n "$STAGING_HOST"
          test -n "$STAGING_USER"
          test -n "$STAGING_SSH_KEY"
          test -n "$STAGING_PATH"

      - name: Deploy application over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            cd "${{ secrets.STAGING_PATH }}"
            git fetch --all --tags
            git checkout main
            git pull --ff-only origin main

            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            npm ci
            npm run build

            php artisan migrate --force
            php artisan optimize:clear
            php artisan optimize

            php artisan storage:link || true
            php artisan queue:restart || true

      - name: Smoke check
        env:
          STAGING_HEALTHCHECK_URL: ${{ secrets.STAGING_HEALTHCHECK_URL }}
        if: ${{ env.STAGING_HEALTHCHECK_URL != '' }}
        run: |
          curl --fail --silent --show-error --location --retry 5 --retry-delay 5 "$STAGING_HEALTHCHECK_URL" > /dev/null


